# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-jazzy-depthai-bridge
  version: 2.12.2
source:
  git: https://github.com/luxonis/depthai-ros-release.git
  tag: release/jazzy/depthai_bridge/2.12.2-1
  target_directory: ros-jazzy-depthai-bridge/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 16
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  license: MIT
  summary: The depthai_bridge package
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - libgl-devel
    - libopencv
    - libopengl-devel
    - numpy
    - pip
    - py-opencv
    - python
    - ros-jazzy-ament-cmake
    - ros-jazzy-camera-info-manager
    - ros-jazzy-composition-interfaces
    - ros-jazzy-cv-bridge
    - ros-jazzy-depthai
    - ros-jazzy-depthai-ros-msgs
    - ros-jazzy-ffmpeg-image-transport-msgs
    - ros-jazzy-image-transport
    - ros-jazzy-rclcpp
    - ros-jazzy-ros-environment
    - ros-jazzy-ros-workspace
    - ros-jazzy-sensor-msgs
    - ros-jazzy-std-msgs
    - ros-jazzy-stereo-msgs
    - ros-jazzy-tf2
    - ros-jazzy-tf2-geometry-msgs
    - ros-jazzy-tf2-ros
    - ros-jazzy-vision-msgs
    - ros2-distro-mutex 0.14.* jazzy_*
  run:
    - libgl-devel
    - libopencv
    - libopengl-devel
    - py-opencv
    - python
    - ros-jazzy-camera-info-manager
    - ros-jazzy-composition-interfaces
    - ros-jazzy-cv-bridge
    - ros-jazzy-depthai
    - ros-jazzy-depthai-ros-msgs
    - ros-jazzy-ffmpeg-image-transport-msgs
    - ros-jazzy-image-transport
    - ros-jazzy-rclcpp
    - ros-jazzy-robot-state-publisher
    - ros-jazzy-ros-workspace
    - ros-jazzy-sensor-msgs
    - ros-jazzy-std-msgs
    - ros-jazzy-stereo-msgs
    - ros-jazzy-tf2
    - ros-jazzy-tf2-geometry-msgs
    - ros-jazzy-tf2-ros
    - ros-jazzy-vision-msgs
    - ros-jazzy-xacro
    - ros2-distro-mutex 0.14.* jazzy_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
