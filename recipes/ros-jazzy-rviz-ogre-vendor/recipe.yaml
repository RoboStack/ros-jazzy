# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-jazzy-rviz-ogre-vendor
  version: 14.1.6
source:
  git: https://github.com/ros2-gbp/rviz-release.git
  tag: release/jazzy/rviz_ogre_vendor/14.1.6-1
  target_directory: ros-jazzy-rviz-ogre-vendor/src/work
  patches:
    - patch/ros-jazzy-rviz-ogre-vendor.patch

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 1
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - vcstool
    - patch
  host:
    - ${{ 'libglu' if linux }}
    - assimp
    - if: build_platform == target_platform
      then:
        - pkg-config
    - freeimage
    - freetype
    - numpy
    - pip
    - pugixml
    - python
    - ros-jazzy-ament-cmake
    - ros-jazzy-ament-cmake-vendor-package
    - ros-jazzy-ament-cmake-xmllint
    - ros-jazzy-ament-lint-auto
    - ros-jazzy-ros-environment
    - ros-jazzy-ros-workspace
    - ros2-distro-mutex 0.6.* jazzy_*
    - xorg-libx11
    - xorg-libxaw
    - xorg-libxrandr
    - xorg-xorgproto
    - zlib
    - zziplib
    - if: linux
      then:
        - libgl-devel
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - assimp
    - freetype
    - python
    - ros-jazzy-ros-workspace
    - ros2-distro-mutex 0.6.* jazzy_*
    - xorg-libx11
    - xorg-libxaw
    - xorg-libxrandr
    - xorg-xorgproto
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
