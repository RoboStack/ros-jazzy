# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-jazzy-gz-transport-vendor
  version: 0.0.6
source:
  git: https://github.com/ros2-gbp/gz_transport_vendor-release.git
  tag: release/jazzy/gz_transport_vendor/0.0.6-1
  target_directory: ros-jazzy-gz-transport-vendor/src/work
  patches:
    - patch/ros-jazzy-gz-transport-vendor.patch

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 10
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - if: build_platform != target_platform
      then:
        - pybind11
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - cppzmq
    - gz-transport13
    - libprotobuf
    - libuuid
    - numpy
    - pip
    - pkg-config
    - protobuf
    - psutil
    - pybind11
    - pytest
    - python
    - ros-jazzy-ament-cmake-copyright
    - ros-jazzy-ament-cmake-core
    - ros-jazzy-ament-cmake-lint-cmake
    - ros-jazzy-ament-cmake-test
    - ros-jazzy-ament-cmake-vendor-package
    - ros-jazzy-ament-cmake-xmllint
    - ros-jazzy-gz-cmake-vendor
    - ros-jazzy-gz-math-vendor
    - ros-jazzy-gz-msgs-vendor
    - ros-jazzy-gz-tools-vendor
    - ros-jazzy-gz-utils-vendor
    - ros-jazzy-ros-environment
    - ros-jazzy-ros-workspace
    - ros2-distro-mutex 0.11.* jazzy_*
    - sqlite 3.*
    - zeromq
  run:
    - cppzmq
    - gz-transport13
    - libprotobuf
    - libuuid
    - pkg-config
    - protobuf
    - psutil
    - pybind11
    - pytest
    - python
    - ros-jazzy-gz-cmake-vendor
    - ros-jazzy-gz-math-vendor
    - ros-jazzy-gz-msgs-vendor
    - ros-jazzy-gz-tools-vendor
    - ros-jazzy-gz-utils-vendor
    - ros-jazzy-ros-workspace
    - ros2-distro-mutex 0.11.* jazzy_*
    - sqlite
    - zeromq
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
