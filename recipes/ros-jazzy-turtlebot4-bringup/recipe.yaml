# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-jazzy-turtlebot4-bringup
  version: 2.0.1
source:
  git: https://github.com/ros2-gbp/turtlebot4_robot-release.git
  tag: release/jazzy/turtlebot4_bringup/2.0.1-2
  target_directory: ros-jazzy-turtlebot4-bringup/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 16
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  license: Apache-2.0
  summary: Turtlebot4 Robot Bringup
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - python
    - ros-jazzy-ament-cmake
    - ros-jazzy-ament-lint-auto
    - ros-jazzy-ament-lint-common
    - ros-jazzy-create3-republisher
    - ros-jazzy-depthai-bridge
    - ros-jazzy-depthai-examples
    - ros-jazzy-depthai-ros-driver
    - ros-jazzy-depthai-ros-msgs
    - ros-jazzy-joy-linux
    - ros-jazzy-nav2-common
    - ros-jazzy-ros-environment
    - ros-jazzy-ros-workspace
    - ros-jazzy-rplidar-ros
    - ros-jazzy-teleop-twist-joy
    - ros-jazzy-tf2-ros
    - ros-jazzy-turtlebot4-description
    - ros-jazzy-turtlebot4-diagnostics
    - ros-jazzy-turtlebot4-node
    - ros2-distro-mutex 0.14.* jazzy_*
  run:
    - python
    - ros-jazzy-create3-republisher
    - ros-jazzy-depthai-bridge
    - ros-jazzy-depthai-examples
    - ros-jazzy-depthai-ros-driver
    - ros-jazzy-depthai-ros-msgs
    - ros-jazzy-joy-linux
    - ros-jazzy-nav2-common
    - ros-jazzy-ros-workspace
    - ros-jazzy-rplidar-ros
    - ros-jazzy-teleop-twist-joy
    - ros-jazzy-tf2-ros
    - ros-jazzy-turtlebot4-description
    - ros-jazzy-turtlebot4-diagnostics
    - ros-jazzy-turtlebot4-node
    - ros2-distro-mutex 0.14.* jazzy_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
