# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-jazzy-gz-ogre-next-vendor
  version: 0.0.5
source:
  git: https://github.com/ros2-gbp/gz_ogre_next_vendor-release.git
  tag: release/jazzy/gz_ogre_next_vendor/0.0.5-1
  target_directory: ros-jazzy-gz-ogre-next-vendor/src/work
  patches:
    - patch/ros-jazzy-gz-ogre-next-vendor.patch

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 10
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - freeimage
    - freetype
    - glslang
    - libboost-devel
    - libvulkan-headers
    - libvulkan-loader
    - numpy
    - ogre-next
    - pip
    - poco
    - python
    - rapidjson
    - ros-jazzy-ament-cmake
    - ros-jazzy-ament-cmake-vendor-package
    - ros-jazzy-ament-cmake-xmllint
    - ros-jazzy-ament-lint-auto
    - ros-jazzy-ros-environment
    - ros-jazzy-ros-workspace
    - ros2-distro-mutex 0.11.* jazzy_*
    - sdl2
    - shaderc
    - tbb
    - tbb-devel
    - tinyxml2
    - xorg-libx11
    - xorg-libxaw
    - xorg-libxrandr
    - xorg-xorgproto
    - zziplib
    - if: linux
      then:
        - libgl-devel
        - libopengl-devel
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - freeimage
    - freetype
    - glslang
    - libboost-devel
    - libvulkan-headers
    - libvulkan-loader
    - ogre-next
    - poco
    - python
    - rapidjson
    - ros-jazzy-ros-workspace
    - ros2-distro-mutex 0.11.* jazzy_*
    - sdl2
    - shaderc
    - tbb
    - tbb-devel
    - tinyxml2
    - xorg-libx11
    - xorg-libxaw
    - xorg-libxrandr
    - xorg-xorgproto
    - zziplib
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
