# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-jazzy-realsense2-camera
  version: 4.56.4
source:
  git: https://github.com/ros2-gbp/realsense-ros-release.git
  tag: release/jazzy/realsense2_camera/4.56.4-1
  target_directory: ros-jazzy-realsense2-camera/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 16
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: http://www.ros.org/wiki/RealSense
  license: Apache-2.0
  summary: RealSense camera package allowing access to Intel D400 3D cameras
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - eigen
    - numpy
    - pip
    - python
    - requests
    - ros-jazzy-ament-cmake
    - ros-jazzy-ament-cmake-gtest
    - ros-jazzy-ament-cmake-pytest
    - ros-jazzy-builtin-interfaces
    - ros-jazzy-cv-bridge
    - ros-jazzy-diagnostic-updater
    - ros-jazzy-geometry-msgs
    - ros-jazzy-image-transport
    - ros-jazzy-launch-pytest
    - ros-jazzy-launch-testing
    - ros-jazzy-librealsense2
    - ros-jazzy-lifecycle-msgs
    - ros-jazzy-nav-msgs
    - ros-jazzy-rclcpp
    - ros-jazzy-rclcpp-components
    - ros-jazzy-rclcpp-lifecycle
    - ros-jazzy-realsense2-camera-msgs
    - ros-jazzy-ros-environment
    - ros-jazzy-ros-workspace
    - ros-jazzy-ros2topic
    - ros-jazzy-sensor-msgs
    - ros-jazzy-sensor-msgs-py
    - ros-jazzy-std-msgs
    - ros-jazzy-std-srvs
    - ros-jazzy-tf2
    - ros-jazzy-tf2-ros
    - ros-jazzy-tf2-ros-py
    - ros2-distro-mutex 0.14.* jazzy_*
  run:
    - eigen
    - python
    - ros-jazzy-builtin-interfaces
    - ros-jazzy-cv-bridge
    - ros-jazzy-diagnostic-updater
    - ros-jazzy-geometry-msgs
    - ros-jazzy-image-transport
    - ros-jazzy-launch-ros
    - ros-jazzy-librealsense2
    - ros-jazzy-lifecycle-msgs
    - ros-jazzy-nav-msgs
    - ros-jazzy-rclcpp
    - ros-jazzy-rclcpp-components
    - ros-jazzy-rclcpp-lifecycle
    - ros-jazzy-realsense2-camera-msgs
    - ros-jazzy-ros-workspace
    - ros-jazzy-sensor-msgs
    - ros-jazzy-std-msgs
    - ros-jazzy-std-srvs
    - ros-jazzy-tf2
    - ros-jazzy-tf2-ros
    - ros2-distro-mutex 0.14.* jazzy_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
