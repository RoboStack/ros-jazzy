jobs:
  stage_0_job_0:
    name: robotiq-description picknik-twist-controller picknik-reset-fault-controller
      moveit-hybrid-planning
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
    needs: []
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-jazzy-robotiq-description ros-jazzy-picknik-twist-controller
        ros-jazzy-picknik-reset-fault-controller ros-jazzy-moveit-hybrid-planning
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-jazzy-robotiq-description ros-jazzy-picknik-twist-controller
          ros-jazzy-picknik-reset-fault-controller ros-jazzy-moveit-hybrid-planning
        BUILD_TARGET: linux-aarch64
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_unix.sh --target $BUILD_TARGET
  stage_1_job_1:
    name: kortex-description kinova-gen3-7dof-robotiq-2f-85-moveit-config moveit2-tutorials
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
    needs:
    - stage_0_job_0
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-jazzy-kortex-description ros-jazzy-kinova-gen3-7dof-robotiq-2f-85-moveit-config
        ros-jazzy-moveit2-tutorials
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-jazzy-kortex-description ros-jazzy-kinova-gen3-7dof-robotiq-2f-85-moveit-config
          ros-jazzy-moveit2-tutorials
        BUILD_TARGET: linux-aarch64
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_unix.sh --target $BUILD_TARGET
name: build_linux_aarch64
on:
  push:
    branches:
    - buildbranch_linux_aarch64
