jobs:
  stage_0_job_0:
    name: rmf-utils moveit-resources moveit-runtime moveit-ros-trajectory-cache
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    needs: []
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-jazzy-rmf-utils ros-jazzy-moveit-resources ros-jazzy-moveit-runtime
        ros-jazzy-moveit-ros-trajectory-cache
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-jazzy-rmf-utils ros-jazzy-moveit-resources ros-jazzy-moveit-runtime
          ros-jazzy-moveit-ros-trajectory-cache
        BUILD_TARGET: ''
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_unix.sh --target $BUILD_TARGET
name: build_unix
on:
  push:
    branches:
    - buildbranch_linux
