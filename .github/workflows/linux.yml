jobs:
  stage_0_job_0:
    name: rviz-imu-plugin imu-complementary-filter imu-tools
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    needs: []
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-jazzy-rviz-imu-plugin ros-jazzy-imu-complementary-filter ros-jazzy-imu-tools
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-jazzy-rviz-imu-plugin ros-jazzy-imu-complementary-filter
          ros-jazzy-imu-tools
        BUILD_TARGET: ''
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_unix.sh --target $BUILD_TARGET
name: build_linux64
on:
  push:
    branches:
    - buildbranch_linux
