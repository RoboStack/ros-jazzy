jobs:
  stage_0_job_0:
    name: grid-map-cmake-helpers octomap-ros octomap octomap-rviz-plugins
    runs-on: macos-14
    strategy:
      fail-fast: false
    needs: []
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-jazzy-grid-map-cmake-helpers ros-jazzy-octomap-ros ros-jazzy-octomap
        ros-jazzy-octomap-rviz-plugins
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-jazzy-grid-map-cmake-helpers ros-jazzy-octomap-ros ros-jazzy-octomap
          ros-jazzy-octomap-rviz-plugins
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_osx_arm64.sh
  stage_1_job_1:
    name: grid-map-core grid-map-msgs octomap-server
    runs-on: macos-14
    strategy:
      fail-fast: false
    needs:
    - stage_0_job_0
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-jazzy-grid-map-core ros-jazzy-grid-map-msgs ros-jazzy-octomap-server
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-jazzy-grid-map-core ros-jazzy-grid-map-msgs ros-jazzy-octomap-server
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_osx_arm64.sh
  stage_2_job_2:
    name: grid-map-cv grid-map-octomap grid-map-sdf grid-map-costmap-2d
    runs-on: macos-14
    strategy:
      fail-fast: false
    needs:
    - stage_1_job_1
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-jazzy-grid-map-cv ros-jazzy-grid-map-octomap ros-jazzy-grid-map-sdf
        ros-jazzy-grid-map-costmap-2d
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-jazzy-grid-map-cv ros-jazzy-grid-map-octomap ros-jazzy-grid-map-sdf
          ros-jazzy-grid-map-costmap-2d
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_osx_arm64.sh
  stage_3_job_3:
    name: grid-map-ros
    runs-on: macos-14
    strategy:
      fail-fast: false
    needs:
    - stage_2_job_2
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-jazzy-grid-map-ros
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-jazzy-grid-map-ros
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_osx_arm64.sh
  stage_4_job_4:
    name: grid-map-visualization grid-map-rviz-plugin grid-map-loader grid-map-filters
      grid-map-pcl
    runs-on: macos-14
    strategy:
      fail-fast: false
    needs:
    - stage_3_job_3
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-jazzy-grid-map-visualization ros-jazzy-grid-map-rviz-plugin
        ros-jazzy-grid-map-loader ros-jazzy-grid-map-filters ros-jazzy-grid-map-pcl
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-jazzy-grid-map-visualization ros-jazzy-grid-map-rviz-plugin
          ros-jazzy-grid-map-loader ros-jazzy-grid-map-filters ros-jazzy-grid-map-pcl
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_osx_arm64.sh
  stage_5_job_5:
    name: grid-map-demos grid-map
    runs-on: macos-14
    strategy:
      fail-fast: false
    needs:
    - stage_4_job_4
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-jazzy-grid-map-demos ros-jazzy-grid-map
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-jazzy-grid-map-demos ros-jazzy-grid-map
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_osx_arm64.sh
name: build_osx
on:
  push:
    branches:
    - buildbranch_osx_arm64
