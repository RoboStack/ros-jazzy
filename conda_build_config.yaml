numpy:
  - 2

assimp:
  - 6
# Workaround for https://github.com/RoboStack/ros-jazzy/pull/40#issuecomment-2782226697
cmake:
  - 3.*
# as of early April 2026 key robotics packages like pinocchio still required eigen 3.4.0.*,
# see https://github.com/conda-forge/eigenpy-feedstock/pull/184
eigen_abi_devel:
  - '3.4.0'
libprotobuf:
  - 6.33.5
protobuf:
  - 6.33.5
fmt:
  - '12.1'
graphviz:
  - '14'
jsoncpp:
  - 1.9.7
libopencv:
  - 4.13.0
libmujoco:
  - 3.8.1
# Mitigation for
# https://github.com/RoboStack/ros-jazzy/pull/126#issuecomment-3515455380
libcap:
  - 2.77
libhwloc:
  - 2.12.2
libxml2:
  - '2.14'
libzenohc:
  - 1.9.0
libzenohcxx:
  - 1.9.0
lua:
  - 5.4
pugixml:
  - '1.15'
shaderc:
  - '2026.2'
spdlog:
  - 1.17
tbb:
  - '2022'
tbb_devel:
  - '2022'
urdfdom:
  - '5.1'
vtk:
  - 9.6.1


cdt_name:  # [linux]
  - conda  # [linux]

python:
  - 3.12.* *_cpython
python_impl:
  - cpython

c_compiler:
  - gcc                        # [linux]
  - clang                      # [osx]
  - vs2022                     # [win]
c_compiler_version:            # [unix]
  - 14                         # [linux]
  - 19                         # [osx]
c_stdlib:
  - sysroot                    # [linux]
  - macosx_deployment_target   # [osx]
  - vs                         # [win]
c_stdlib_version:              # [unix]
  - 2.17                       # [linux]
  - 11.0                       # [osx and x86_64]
  - 11.0                       # [osx and arm64]
cxx_compiler:
  - gxx                        # [linux]
  - clangxx                    # [osx]
  - vs2022                     # [win]
cxx_compiler_version:          # [unix]
  - 14                         # [linux]
  - 19                         # [osx]

lbr_fri_client_sdk:
  - '1.11'
  - '1.14'
  - '1.15'
  - '1.16'
  - '1.17'
